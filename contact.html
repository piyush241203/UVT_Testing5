<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UVT Static HTML Demo - Contact</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <div class="nav-container">
      <div class="logo">⚡ UVT HTML</div>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
      <ul class="nav-menu">
        <li class="nav-item"><a href="./">Home</a></li>
        <li class="nav-item"><a href="./about.html">About</a></li>
        <li class="nav-item"><a href="./services.html">Services</a></li>
        <li class="nav-item"><a href="./portfolio.html">Portfolio</a></li>
        <li class="nav-item"><a href="./blog.html">Blog</a></li>
        <li class="nav-item active"><a href="./contact.html">Contact</a></li>
      </ul>
    </div>
  </header>

  <section class="hero">
    <h1>Contact Our Lab</h1>
    <p>Submit questions regarding visual validation matrices, compatibility suites, or decision auditing.</p>
  </section>

  <main class="container">
    <form id="mock-contact-form" onsubmit="event.preventDefault(); alert('Message sent!');">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="john@example.com" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="Enter your inquiry..." required></textarea>
      </div>
      <button type="submit">Send Message</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 Universal Visual Testing Platform. Multi-page HTML Certification fixtures.</p>
  </footer>

  <script type="module" src="./main.js"></script>
</body>
</html>
